{% extends 'base.html' %}
{% block content %}
<h4><i class="bi bi-bell me-2"></i>Notificaciones</h4>

{% for n in notifications %}
<div class="card mb-2 {% if not n.is_read %}" style="border-color: var(--accent);{% endif %}">
    <div class="card-body py-2 d-flex justify-content-between align-items-center">
        <div>
            <p class="mb-0">{{ n.message }}</p>
            <small class="text-muted">{{ n.created_at|date:'d/m/Y H:i' }}</small>
        </div>
        <div>
            {% if not n.is_read %}
            <a href="{% url 'notification_read' n.pk %}" class="btn btn-sm btn-outline-light">Leer</a>
            {% endif %}
        </div>
    </div>
</div>
{% empty %}
<p class="text-muted">No tenés notificaciones.</p>
{% endfor %}
{% endblock %}
