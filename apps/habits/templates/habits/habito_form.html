{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mb-3">
            <div class="card-header"><i class="bi bi-star me-2" style="color: var(--accent);"></i>Misión Principal — Nuevo hábito</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nombre del hábito</label>
                        <input type="text" name="title" class="form-control" placeholder="Ej: Leer 30 minutos" required autofocus>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label">Hora de inicio</label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Hora de fin</label>
                            <input type="time" name="end_time" class="form-control" required>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Crear</button>
                        <a href="{% url 'habito_list' %}" class="btn btn-outline-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
