{% extends 'base.html' %}
{% block title %}Nueva tarea - StarStudy{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">
                {% if is_personal %}Nueva tarea personal{% else %}Asignar tarea{% endif %}
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" aria-label="{% if is_personal %}Nueva tarea personal{% else %}Asignar tarea{% endif %}">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field.errors }}
                        {{ field }}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
